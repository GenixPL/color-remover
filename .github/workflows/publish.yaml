name: Publish to Github Pages

on:
  push:
    branches:
      - 'release'
  # This line alone enables the manual trigger with branch selection
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: python -m pip install --upgrade pip

      - name: Build web 🔨
        run: |
          mkdir build
          cp -r index.html build
          cp -r main.py build
          cp -r pyscript.json build

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/
