<!DOCTYPE html>
<html>
  <head>
      <meta charset="utf-8" />
      <meta name="viewport" content="width=device-width,initial-scale=1" />
      <title>🦜 Polyglot - Piratical PyScript</title>
      <link rel="stylesheet" href="https://pyscript.net/releases/2026.3.1/core.css">
      <script type="module" src="https://pyscript.net/releases/2026.3.1/core.js"></script>


  </head>

    <body>
      <h1>Polyglot 🦜 💬 🇬🇧 ➡️ 🏴‍☠️</h1>
      <p>Translate English into Pirate speak...</p>
      <input type="text" id="english" placeholder="Type English here..." />
      <button id="translate-button">Translate</button>
      <div id="output"></div>

      <br>
      <input type="file" id="file-selector" accept="image/*"/>
      <br>
      <img id="output-image" style="max-width: 500px; display: none;" />

      <script type="py" src="./main.py" config="./pyscript.json"></script>
    </body>
</html>
